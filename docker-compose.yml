services:
  bookclub:
    build: .
    container_name: bookclub
    environment:
      - TZ=${TZ}
      - HARDCOVER_TOKEN=${HARDCOVER_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - ABS_URL=${ABS_URL}
      - ABS_TOKEN=${ABS_TOKEN}
      - ABS_PLAYLIST_ID=${ABS_PLAYLIST_ID}
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      # Live app code — changes on host reflect immediately without rebuild
      - ./app:/app
      # Named volume for the app database
      - bookclub_data:/data
      # ABS config mounted read-only for library cross-reference
      - audiobookshelf_config:/abs_config:ro
    ports:
      - "${BOOKCLUB_PORT}:8080"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "org.opencontainers.image.source=https://github.com/nickwolf/bookclub"
      - "org.opencontainers.image.description=Self-hosted book recommendation app — Hardcover + Audiobookshelf + Claude AI"
      - "org.opencontainers.image.licenses=MIT"

volumes:
  # App database — persists across rebuilds. Docker creates this automatically.
  bookclub_data:

  # Audiobookshelf config volume (for library cross-reference).
  # If you run ABS via Docker and want to share its volume, replace the block below with:
  #   audiobookshelf_config:
  #     external: true
  # Make sure the volume name matches what your ABS container uses.
  # If you don't use ABS, leave this as-is — the app degrades gracefully.
  audiobookshelf_config:
