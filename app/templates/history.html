{% extends "base.html" %}
{% block title %}History · Bookclub{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Reading History</h1>
  <p class="subtitle">{{ total }} books shown · {{ stats.hc_read }} total read · synced from Hardcover</p>
</div>

<form class="history-filters" method="get" action="/history"
      hx-get="/history" hx-target="#history-results"
      hx-trigger="input from:find input[name=q] changed delay:300ms, change from:find select[name=rating], submit">
  <input type="search" name="q" value="{{ q }}" placeholder="Search title or author…">
  <select name="rating">
    <option value="">All ratings</option>
    <option value="5" {% if rating == "5" %}selected{% endif %}>5★ only</option>
    <option value="4" {% if rating == "4" %}selected{% endif %}>4★+</option>
    <option value="3" {% if rating == "3" %}selected{% endif %}>3★+</option>
  </select>
  <button type="submit" class="btn">Filter</button>
  {% if q or rating %}<a href="/history" class="btn btn-pass">Clear</a>{% endif %}
</form>

{% include "partials/history_results.html" %}

{% endblock %}
